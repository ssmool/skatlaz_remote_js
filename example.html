<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Skatlaz Remote JS - Exemplo Simples</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .card {
            background: #f0f0f0;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
        pre {
            background: #fff;
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
        }
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            background: #d1ecf1;
            color: #0c5460;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>{titulo}</h1>
        <p>{mensagem}</p>
        <div><strong>Valor:</strong> {valor}</div>
    </div>

    <div class="card">
        <button onclick="carregarJSON()">Carregar JSON</button>
        <button onclick="carregarCSV()">Carregar CSV</button>
        <button onclick="carregarXML()">Carregar XML</button>
        <button onclick="carregarRSS()">Carregar RSS</button>
    </div>

    <div class="card">
        <h3>Resultado:</h3>
        <div id="resultado"></div>
        <div id="status" class="status">✅ Pronto</div>
    </div>

    <script src="skatlaz_parser_js.js"></script>
    <script src="skatlaz_js.js"></script>

    <script>
        // Dados de exemplo
        const dadosExemplo = {
            titulo: "Skatlaz Remote JS",
            mensagem: "Dados carregados com sucesso!",
            valor: "Funcionando!"
        };

        // Função para mostrar status
        function mostrarStatus(msg) {
            document.getElementById('status').innerHTML = msg;
        }

        // Carregar JSON
        function carregarJSON() {
            _set_addr(dadosExemplo);
            _skatlaz_remote().then(() => {
                bind(document.body);
                mostrarStatus("✅ JSON carregado!");
                document.getElementById('resultado').innerHTML = '<pre>' + JSON.stringify(dadosExemplo, null, 2) + '</pre>';
            });
        }

        // Carregar CSV
        function carregarCSV() {
            const csvData = "nome,idade,cidade\nJoão,25,São Paulo\nMaria,30,Rio\nCarlos,35,BH";
            _set_data(csvData);
            const resultado = streamCSV();
            mostrarStatus("✅ CSV processado!");
            document.getElementById('resultado').innerHTML = '<pre>' + JSON.stringify(resultado, null, 2) + '</pre>';
        }

        // Carregar XML
        function carregarXML() {
            const xmlData = '<?xml version="1.0"?><root><item><id>1</id><nome>Produto 1</nome></item><item><id>2</id><nome>Produto 2</nome></item></root>';
            _set_data(xmlData);
            const resultado = streamXML();
            mostrarStatus("✅ XML processado!");
            document.getElementById('resultado').innerHTML = '<pre>' + JSON.stringify(resultado, null, 2) + '</pre>';
        }

        // Carregar RSS
        function carregarRSS() {
            const rssData = '<?xml version="1.0"?><rss><channel><item><title>Notícia 1</title><description>Texto 1</description></item><item><title>Notícia 2</title><description>Texto 2</description></item></channel></rss>';
            _set_data(rssData);
            const resultado = streamRSS();
            mostrarStatus("✅ RSS processado!");
            document.getElementById('resultado').innerHTML = '<pre>' + JSON.stringify(resultado, null, 2) + '</pre>';
        }

        // Inicializar
        carregarJSON();
    </script>
</body>
</html>
